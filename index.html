<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adilet Qorgau</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
padding:80px 20px;
text-align:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
}

h1{
font-size:60px;
margin-bottom:10px;
}

p{
font-size:20px;
color:#cbd5e1;
}

.button{
display:inline-block;
margin-top:30px;
padding:15px 35px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:12px;
font-size:18px;
}

.section{
padding:60px 20px;
max-width:1000px;
margin:auto;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:40px;
}

.card{
background:#1e293b;
padding:30px;
border-radius:20px;
}

footer{
text-align:center;
padding:40px;

</head>

</p>

<a class="button" href="#">
Получить консультацию
</a>

</header>

<section class="section">

<h2>Наши услуги</h2>

<div class="cards">

<div class="card">
<h3>МФО и банки</h3>
<p>
Помощь по займам, коллекторам и судебным делам
</p>
</div>

<div class="card">
<h3>Снятие запрета</h3>
<p>
Помощь по ограничениям на выезд и арестам
</p>
</div>

<div class="card">
<h3>Суды и жалобы</h3>

Подготовка документов и обращений
</p>
</div>

</div>

</section>

<footer>
© 2026 Adilet Qorgau
</footer>

</body>
</html>
